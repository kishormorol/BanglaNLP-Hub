name: Nightly link check

on:
  schedule:
    # 03:20 UTC daily. Off the hour to avoid GitHub's scheduling pile-up.
    - cron: '20 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check every link in /data
        id: check
        # Writes report.md either way; non-zero exit just means dead links exist.
        run: npm run check-links -- --report report.md
        continue-on-error: true

      - name: Open or update the dead-links issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: 'Dead links in /data'
          FAILED: ${{ steps.check.outcome == 'failure' }}
        run: |
          set -euo pipefail

          existing=$(gh issue list --state open --search "$TITLE in:title" \
            --json number,title \
            --jq "[.[] | select(.title == \"$TITLE\")] | .[0].number // empty")

          if [ "$FAILED" != "true" ]; then
            # Everything resolves — close a previously-open report, if any.
            if [ -n "$existing" ]; then
              gh issue comment "$existing" --body "All links in \`/data\` are reachable again as of $(date -u +%Y-%m-%d). Closing."
              gh issue close "$existing"
            fi
            echo "No dead links."
            exit 0
          fi

          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          {
            echo "_Automated nightly check. Entries are never removed automatically._"
            echo
            # GitHub caps issue bodies at 65536 chars. Keep well under it and
            # point at the run for the complete list rather than failing to post.
            head -c 60000 report.md
            if [ "$(wc -c < report.md)" -gt 60000 ]; then
              printf '\n\n_…report truncated. See the [full workflow run](%s) for every dead link._\n' "$run_url"
            fi
          } > body.md

          # Ensure the label exists so --label never aborts issue creation.
          gh label create data --color 0e8a16 --description "Data quality issues" 2>/dev/null || true

          if [ -n "$existing" ]; then
            # Keep ONE issue and rewrite its body, rather than filing a new one nightly.
            gh issue edit "$existing" --body-file body.md
            echo "Updated issue #$existing"
          else
            gh issue create --title "$TITLE" --body-file body.md --label "data"
          fi
