- id: bnlp-toolkit
  name: bnlp-toolkit
  author: sagorsarker
  desc: Tokenization, embeddings (word2vec/fastText/GloVe), NER, POS for Bangla.
  lang: Python
  install: pip install bnlp_toolkit
  link: https://github.com/sagorbrur/bnlp
  verified: 2026-06-28
- id: normalizer
  name: normalizer
